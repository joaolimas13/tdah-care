<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel da Psicóloga - CleanTdah</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 20px; background-color: #f0f2f5; color: #333; }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 20px; }
        .container { max-width: 960px; margin: 0 auto; }
        .painel-resumo { display: flex; justify-content: space-around; background: #2980b9; color: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .resumo-item { text-align: center; }
        .resumo-valor { font-size: 2em; font-weight: bold; }
        .acoes-topo { display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        button { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-atualizar { background-color: #27ae60; color: white; }
        .btn-csv { background-color: #f39c12; color: white; }
        .btn-pdf { background-color: #c0392b; color: white; }
        .btn-remover { background-color: #e74c3c; color: white; padding: 5px 10px; font-size: 0.9em; margin-top: 10px; }
        .btn-salvar-notas { background-color: #1565C0; color: white; padding: 7px 14px; font-size: 0.85em; margin-top: 8px; border-radius: 8px; }
        .btn-whatsapp { background-color: #25D366; color: white; padding: 7px 14px; font-size: 0.85em; margin-top: 8px; border-radius: 8px; display: inline-flex; align-items: center; gap: 5px; }
        button:hover { opacity: 0.85; }
        details { background: white; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); padding: 15px; border-left: 5px solid #3498db; }
        summary { font-size: 1.2em; font-weight: bold; color: #2c3e50; cursor: pointer; list-style: none; outline: none; display: flex; justify-content: space-between; align-items: center; }
        summary::-webkit-details-marker { display: none; }
        .conteudo-card { margin-top: 15px; padding-top: 15px; border-top: 1px solid #eee; }
        .dados-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 16px; }
        .dado-item { background: #f8f9fa; padding: 10px; border-radius: 5px; font-size: 0.9em; }
        .dado-item strong { display: block; color: #555; font-size: 0.8em; margin-bottom: 2px; }
        .dado-item span { font-size: 1.1em; font-weight: 700; color: #1565C0; }
        .analise-auto { background: #e8f8f5; padding: 12px; border-radius: 5px; border-left: 4px solid #1abc9c; font-style: italic; margin-bottom: 14px; font-size: 0.9em; }
        .score-badge { padding: 4px 14px; border-radius: 20px; font-size: 0.85em; font-weight: 800; color: white; }

        /* Relatório Clínico */
        .rel-secao { background: #F8FAFF; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; border-left: 4px solid #1565C0; }
        .rel-secao h3 { font-size: 0.9em; font-weight: 700; color: #1565C0; margin-bottom: 8px; }
        .rel-linha { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #EEF2F7; font-size: 0.85em; }
        .rel-linha:last-child { border-bottom: none; }
        .rel-linha .lbl { color: #546E7A; }
        .rel-linha .val { font-weight: 700; color: #1A237E; }
        .cl-norm { background: #E8F5E9; color: #2E7D32; padding: 2px 8px; border-radius: 10px; font-size: 0.75em; font-weight: 700; }
        .cl-atenc { background: #FFF8E1; color: #F57F17; padding: 2px 8px; border-radius: 10px; font-size: 0.75em; font-weight: 700; }
        .cl-crit  { background: #FFEBEE; color: #C62828; padding: 2px 8px; border-radius: 10px; font-size: 0.75em; font-weight: 700; }
        .clinico-topo { background: linear-gradient(135deg,#0D47A1,#1565C0); color: white; padding: 16px 20px; border-radius: 12px 12px 0 0; margin-bottom: 0; }
        .clinico-topo .ct-titulo { font-size: 0.95em; font-weight: 800; margin-bottom: 2px; }
        .clinico-topo .ct-sub { font-size: 0.75em; opacity: 0.85; margin-bottom: 10px; }
        .ct-meta { display: flex; gap: 10px; }
        .ct-meta-item { background: rgba(255,255,255,0.15); border-radius: 10px; padding: 8px 12px; flex: 1; text-align: center; }
        .ct-meta-item .ctm-val { font-size: 1.1em; font-weight: 800; }
        .ct-meta-item .ctm-lbl { font-size: 0.62em; opacity: 0.85; margin-top: 2px; }
        .clinico-wrap { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(21,101,192,0.12); margin-bottom: 12px; }
        .clinico-secao { padding: 14px 18px; border-bottom: 1px solid #EEF2F7; }
        .clinico-secao:last-child { border-bottom: none; }
        .clinico-secao-titulo { font-size: 0.72em; font-weight: 800; color: #1565C0; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; }
        .clinico-linha { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid #F5F7FA; font-size: 0.85em; }
        .clinico-linha:last-child { border-bottom: none; }
        .clinico-linha .cl-lbl { color: #546E7A; flex: 1; }
        .clinico-linha .cl-val { font-weight: 700; color: #1A237E; margin-left: 8px; }
        .clinico-linha .cl-badge { font-size: 0.68em; padding: 3px 8px; border-radius: 10px; font-weight: 700; margin-left: 6px; flex-shrink: 0; }
        .clinico-grafico { display: flex; gap: 4px; align-items: flex-end; height: 60px; margin: 10px 0; }
        .clinico-grafico-bar { flex: 1; border-radius: 4px 4px 0 0; min-height: 4px; }
        .clinico-parecer { background: #F0F7FF; border-left: 4px solid #1565C0; border-radius: 0 12px 12px 0; padding: 14px 16px; margin: 10px 0; font-size: 0.84em; color: #37474F; line-height: 1.7; }
        .clinico-aviso { background: #FFF8E1; border: 1px solid #FFE082; border-radius: 10px; padding: 10px 14px; font-size: 0.8em; color: #5D4037; line-height: 1.5; margin-top: 10px; }
        .periodo-filtro { background: #EEF2FF; border-radius: 10px; padding: 12px 16px; margin-bottom: 14px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .periodo-filtro label { font-size: 0.8em; color: #3949AB; font-weight: 700; }
        .periodo-filtro input[type=date] { border: 1.5px solid #90CAF9; border-radius: 8px; padding: 6px 8px; font-size: 0.82em; }
        .periodo-filtro button { background: #1565C0; color: white; border-radius: 8px; padding: 6px 14px; font-size: 0.8em; }
        .tab-nav { display: flex; gap: 8px; margin-bottom: 14px; border-bottom: 2px solid #E3EAF2; padding-bottom: 8px; flex-wrap: wrap; }
        .tab-btn { background: none; border: none; padding: 8px 16px; font-size: 0.85em; font-weight: 700; color: #90A4AE; cursor: pointer; border-radius: 8px 8px 0 0; }
        .tab-btn.active { background: #1565C0; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .hist-item { border-bottom: 1px dashed #E3EAF2; padding: 8px 0; font-size: 0.85em; }
        .hist-item:last-child { border-bottom: none; }
        .hist-data { font-weight: 700; color: #1565C0; margin-bottom: 3px; }
        .hist-linha { color: #546E7A; }
        .hist-linha span { font-weight: 600; color: #37474F; }

        /* Notas clínicas */
        .notas-area { width: 100%; min-height: 100px; padding: 10px 14px; border: 2px solid #BBDEFB; border-radius: 10px; font-size: 0.88em; font-family: inherit; resize: vertical; background: #F8FAFF; color: #1A237E; outline: none; transition: border 0.2s; }
        .notas-area:focus { border-color: #1565C0; background: white; }
        .notas-salvas-info { font-size: 0.75em; color: #81C784; margin-left: 8px; }

        /* Contato / WhatsApp */
        .contato-section { background: #F0FFF4; border: 1.5px solid #A5D6A7; border-radius: 10px; padding: 14px 16px; margin-top: 14px; }
        .contato-title { font-size: 0.78em; font-weight: 800; color: #1B5E20; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
        .contato-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .contato-row input { flex: 1; min-width: 160px; padding: 9px 12px; border: 1.5px solid #A5D6A7; border-radius: 8px; font-size: 0.85em; outline: none; }
        .contato-row input:focus { border-color: #25D366; }
        .contato-salvo { font-size: 0.78em; color: #2E7D32; margin-top: 6px; }
    </style>
</head>
<body>

<div class="container" id="conteudo-principal" style="display:none;">
    <h1>🧠 Painel de Acompanhamento — CleanTdah</h1>
    
    <div class="painel-resumo">
        <div class="resumo-item">
            <div class="resumo-valor" id="total-pacientes">0</div>
            <div>Pacientes Registrados</div>
        </div>
        <div class="resumo-item">
            <div class="resumo-valor" id="score-medio">0</div>
            <div>Score Médio Geral</div>
        </div>
    </div>

    <div class="acoes-topo">
        <button class="btn-atualizar" id="btn-atualizar">🔄 Atualizar Dados</button>
        <button class="btn-csv" id="btn-csv">📊 Exportar CSV</button>
        <button class="btn-pdf" onclick="imprimirRelatorioAdmin()">📄 Salvar PDF</button>
    </div>
    
    <div id="lista-relatorios">
        <p style="text-align:center;">Carregando...</p>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
    // ===== SENHA =====
    const senhaCorreta = "psico2024";
    const senhaDigitada = prompt("Bem-vinda ao Painel Admin.\nDigite a senha para acessar:");
    if (senhaDigitada === senhaCorreta) {
        document.getElementById('conteudo-principal').style.display = 'block';
    } else {
        document.body.innerHTML = "<h1 style='text-align:center;color:red;margin-top:50px;'>Acesso Negado.</h1>";
        throw new Error("Senha incorreta.");
    }

    // ===== FIREBASE =====
    const firebaseConfig = {
        apiKey: "AIzaSyDh-S0VXw3oIabAkyoJHLVvvLfVjN29enw",
        authDomain: "cleantdah.firebaseapp.com",
        projectId: "cleantdah",
        storageBucket: "cleantdah.firebasestorage.app",
        messagingSenderId: "553813989536",
        appId: "1:553813989356:web:7852d1fea9d8906ee091c5"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let dadosGlobais = [];

    // ===== HELPERS =====
    function pad(n) { return String(n).padStart(2,'0'); }
    function hojeISO(date) { date = date || new Date(); return date.getFullYear()+'-'+pad(date.getMonth()+1)+'-'+pad(date.getDate()); }

    // ===== NOTAS LOCAIS =====
    function salvarNotas(uid) {
        const textarea = document.getElementById('notas-'+uid);
        if (!textarea) return;
        const texto = textarea.value;
        localStorage.setItem('notas_psico_'+uid, texto);
        const info = document.getElementById('notas-info-'+uid);
        if (info) { info.textContent = '✅ Salvo às ' + new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); }
    }

    function carregarNotas(uid) {
        return localStorage.getItem('notas_psico_'+uid) || '';
    }

    // ===== CONTATO / WHATSAPP =====
    function salvarTelefone(uid) {
        const inp = document.getElementById('tel-'+uid);
        if (!inp) return;
        localStorage.setItem('tel_paciente_'+uid, inp.value);
        const info = document.getElementById('tel-info-'+uid);
        if (info) info.textContent = '✅ Salvo!';
    }

    function carregarTelefone(uid) {
        return localStorage.getItem('tel_paciente_'+uid) || '';
    }

    function abrirWhatsApp(uid, apelido) {
        const tel = document.getElementById('tel-'+uid);
        const numero = tel ? tel.value.replace(/\D/g,'') : '';
        if (!numero) { alert('Por favor, cadastre o número de WhatsApp do paciente primeiro.'); return; }
        const msg = encodeURIComponent('Olá ' + apelido + '! 👋 Passando para acompanhar seu progresso desta semana. Tudo bem?');
        window.open('https://wa.me/55' + numero + '?text=' + msg, '_blank');
    }

    function enviarRelatorioWhatsApp(uid, apelido, score, sonoMedia, metasPct) {
        const tel = document.getElementById('tel-'+uid);
        const numero = tel ? tel.value.replace(/\D/g,'') : '';
        if (!numero) { alert('Por favor, cadastre o número de WhatsApp do paciente primeiro.'); return; }
        const msg = encodeURIComponent(
            '📋 *Relatório Semanal — TDAH Care*\n\n' +
            '👤 Paciente: ' + apelido + '\n' +
            '📊 Score: ' + (score||0) + '/100\n' +
            '😴 Sono médio: ' + (sonoMedia ? sonoMedia+'h' : '—') + '\n' +
            '🎯 Metas: ' + (metasPct != null ? metasPct+'%' : '—') + '\n\n' +
            'Acesse o app para mais detalhes: https://cleantdah.web.app'
        );
        window.open('https://wa.me/55' + numero + '?text=' + msg, '_blank');
    }

    // ===== RELATÓRIO CLÍNICO =====
    function gerarRelatorioClinico(dailyData, periodoIni, periodoFim) {
        if (!dailyData || typeof dailyData !== 'object') {
            return '<div class="clinico-aviso">Nenhum dado diário sincronizado para este paciente ainda.</div>';
        }

        const dataIniObj = periodoIni ? new Date(periodoIni + 'T00:00:00') : new Date(new Date().setDate(new Date().getDate()-29));
        const dataFimObj = periodoFim ? new Date(periodoFim + 'T00:00:00') : new Date();
        const daysN = Math.round((dataFimObj - dataIniObj) / (1000*60*60*24)) + 1;

        let sonoTotal=0,sonoN=0,sonoAbaixo7=0,metasConcl=0,metasTotal=0,
            focoTotal=0,focoN=0,celularTotal=0,celularN=0,remedioN=0,
            leituraTotal=0,leituraN=0,diasDados=0;
        const sonoSeries=[], focoSeries=[];

        for(let i=daysN-1;i>=0;i--){
            const d = new Date(dataFimObj); d.setDate(dataFimObj.getDate()-i);
            const iso = hojeISO(d); const dd = dailyData[iso];
            if(!dd){ sonoSeries.push(null); focoSeries.push(0); continue; }
            diasDados++;
            if(dd.sono&&dd.sono.length>0){
                const h=dd.sono[0].horas; sonoTotal+=h; sonoN++;
                if(h<7) sonoAbaixo7++;
                sonoSeries.push(h);
            } else { sonoSeries.push(null); }
            const allMetas=[...(dd.metas||[]),...(dd.metasFixas||[])];
            if(allMetas.length>0){ metasConcl+=allMetas.filter(m=>m.done).length; metasTotal+=allMetas.length; }
            if(dd.pom&&dd.pom.minFoco>0){ focoTotal+=dd.pom.minFoco; focoN++; focoSeries.push(dd.pom.minFoco); }
            else focoSeries.push(0);
            if(dd.celular){ celularTotal+=dd.celular.horas*60+dd.celular.minutos; celularN++; }
            if(dd.remedio) remedioN++;
            if(dd.leitura){ leituraTotal+=dd.leitura.paginas; leituraN++; }
        }

        if(diasDados===0) return '<div class="clinico-aviso">📋 Nenhum dado registrado neste período.</div>';

        const avgSono = sonoN>0?(sonoTotal/sonoN):null;
        const pctMetas = metasTotal>0?Math.round((metasConcl/metasTotal)*100):null;
        const avgFoco = focoN>0?Math.round(focoTotal/focoN):null;
        const avgCelular = celularN>0?Math.round(celularTotal/celularN):null;
        const pctRemedio = Math.round((remedioN/diasDados)*100);

        let scoreTotal=0, scoreMax=0;
        if(avgSono!==null){scoreMax+=30; scoreTotal+=avgSono>=7?30:avgSono>=6?18:avgSono>=5?8:2;}
        if(pctMetas!==null){scoreMax+=30; scoreTotal+=Math.round((pctMetas/100)*30);}
        if(avgFoco!==null){scoreMax+=25; scoreTotal+=Math.min(25,Math.round((avgFoco/60)*25));}
        if(avgCelular!==null){scoreMax+=15; scoreTotal+=avgCelular<=120?15:avgCelular<=240?10:avgCelular<=360?5:0;}
        const scoreGeral = scoreMax>0?Math.round((scoreTotal/scoreMax)*100):0;
        const scoreCor = scoreGeral>=75?'#2E7D32':scoreGeral>=50?'#F57F17':'#C62828';
        const scoreLabel = scoreGeral>=75?'Boa adesão ao tratamento':scoreGeral>=50?'Adesão moderada':'Adesão baixa — requer atenção';

        const sonoMax = Math.max(...sonoSeries.filter(v=>v!==null), 9);
        const focoMax = Math.max(...focoSeries, 60);
        const grafSono = sonoSeries.slice(-14).map(v => {
            const h = Math.round((v||0)/sonoMax*100);
            const cor = !v?'#EEF2F7':v>=7?'#43A047':v>=6?'#FFA726':'#EF5350';
            return `<div class="clinico-grafico-bar" style="height:${Math.max(4,h)}%;background:${cor};flex:1;" title="${v?v+'h':'—'}"></div>`;
        }).join('');
        const grafFoco = focoSeries.slice(-14).map(v => {
            const h = Math.round((v/focoMax)*100);
            const cor = v>=60?'#7C3AED':v>=30?'#A78BFA':'#E3E3E3';
            return `<div class="clinico-grafico-bar" style="height:${Math.max(4,h)}%;background:${cor};flex:1;" title="${v?v+'min':'—'}"></div>`;
        }).join('');

        function row(lbl,val,badge,badgeTxt){
            return `<div class="clinico-linha"><span class="cl-lbl">${lbl}</span><span class="cl-val">${val}</span><span class="cl-badge ${badge}">${badgeTxt}</span></div>`;
        }
        function parecerSono(){
            if(!avgSono) return 'Dados de sono insuficientes para análise.';
            let txt=`Média de ${avgSono.toFixed(1)}h/noite. `;
            if(avgSono>=8) txt+='Padrão de sono <strong>dentro dos parâmetros ideais</strong> (7–9h).';
            else if(avgSono>=7) txt+='Sono <strong>limítrofe ao adequado</strong>.';
            else if(avgSono>=6) txt+='Sono <strong>abaixo do recomendado</strong>. Privação crônica leve agrava desatenção.';
            else txt+='Sono <strong>significativamente abaixo do limiar terapêutico</strong>.';
            if(sonoAbaixo7>0) txt+=` <strong>${sonoAbaixo7} noites abaixo de 7h</strong> no período.`;
            return txt;
        }
        function parecerMetas(){
            if(pctMetas===null) return 'Dados de metas insuficientes.';
            let txt=`Taxa de conclusão: <strong>${pctMetas}%</strong> (${metasConcl}/${metasTotal}). `;
            if(pctMetas>=80) txt+='<strong>Desempenho satisfatório</strong>.';
            else if(pctMetas>=60) txt+='Desempenho <strong>moderado</strong>.';
            else if(pctMetas>=40) txt+='Desempenho <strong>abaixo do esperado</strong>.';
            else txt+='<strong>Dificuldade persistente</strong> na execução de planejamento.';
            return txt;
        }
        function parecerFoco(){
            if(!avgFoco) return 'Nenhuma sessão de foco registrada.';
            const totalH=Math.floor(focoTotal/60), totalM=focoTotal%60;
            let txt=`Total de <strong>${totalH>0?totalH+'h ':''}${totalM>0?totalM+'min':''}de foco</strong> em ${focoN} dias. Média de ${avgFoco}min/dia. `;
            if(avgFoco>=60) txt+='Volume de foco <strong>adequado</strong>.';
            else if(avgFoco>=30) txt+='Volume de foco <strong>moderado</strong>.';
            else txt+='Volume de foco <strong>baixo</strong>.';
            return txt;
        }
        function parecerTela(){
            if(!avgCelular) return 'Tempo de tela não monitorado.';
            const h=Math.floor(avgCelular/60), m=avgCelular%60;
            let txt=`Média de <strong>${h}h${m>0?m+'min':''}/dia</strong>. `;
            if(avgCelular<=120) txt+='<strong>Controle adequado</strong>.';
            else if(avgCelular<=240) txt+='Uso <strong>moderado a elevado</strong>.';
            else txt+='<strong>Uso elevado</strong>. Correlaciona negativamente com atenção sustentada.';
            return txt;
        }

        const fmtD = d => d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});
        const fmtM = d => d.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});

        return `
        <div style="font-size:0.72em;color:#90A4AE;text-align:right;margin-bottom:8px;">
            📅 ${fmtD(dataIniObj)} a ${fmtD(dataFimObj)}
        </div>
        <div class="clinico-wrap">
            <div class="clinico-topo">
                <div class="ct-titulo">📋 Relatório Clínico de Acompanhamento</div>
                <div class="ct-sub">TDAH Care · ${fmtM(dataFimObj)} · ${diasDados} dias com registro</div>
                <div class="ct-meta">
                    <div class="ct-meta-item"><div class="ctm-val" style="color:${scoreCor};">${scoreGeral}</div><div class="ctm-lbl">Score /100</div></div>
                    <div class="ct-meta-item"><div class="ctm-val">${diasDados}</div><div class="ctm-lbl">Dias registrados</div></div>
                    <div class="ct-meta-item"><div class="ctm-val">${pctRemedio}%</div><div class="ctm-lbl">Uso do remédio</div></div>
                </div>
            </div>
            <div class="clinico-secao">
                <div class="clinico-secao-titulo">📊 Indicadores do Período</div>
                ${avgSono!==null?row('Média de sono/noite', avgSono.toFixed(1)+'h', avgSono>=7?'cl-norm':avgSono>=6?'cl-atenc':'cl-crit', avgSono>=7?'Adequado':avgSono>=6?'Atenção':'Crítico'):''}
                ${pctMetas!==null?row('Taxa de conclusão de metas', pctMetas+'% ('+metasConcl+'/'+metasTotal+')', pctMetas>=70?'cl-norm':pctMetas>=50?'cl-atenc':'cl-crit', pctMetas>=70?'Adequada':pctMetas>=50?'Moderada':'Baixa'):''}
                ${avgFoco!==null?row('Média de foco diário', avgFoco+'min/dia', avgFoco>=40?'cl-norm':avgFoco>=20?'cl-atenc':'cl-crit', avgFoco>=40?'Adequado':avgFoco>=20?'Moderado':'Baixo'):''}
                ${avgCelular!==null?row('Média de tempo de tela', Math.floor(avgCelular/60)+'h'+(avgCelular%60>0?avgCelular%60+'min':'')+'/dia', avgCelular<=180?'cl-norm':avgCelular<=300?'cl-atenc':'cl-crit', avgCelular<=180?'Controlado':avgCelular<=300?'Moderado':'Elevado'):''}
                ${remedioN>0?row('Registro de medicação', remedioN+'/'+diasDados+' dias', pctRemedio>=80?'cl-norm':pctRemedio>=60?'cl-atenc':'cl-crit', pctRemedio>=80?'Frequente':pctRemedio>=60?'Moderado':'Baixo'):''}
                ${leituraN>0?row('Leitura acumulada', leituraTotal+' páginas em '+leituraN+' dias', 'cl-norm', 'Registrada'):''}
            </div>
        </div>
        ${sonoN>0?`
        <div class="clinico-wrap">
            <div class="clinico-secao">
                <div class="clinico-secao-titulo">😴 Evolução do Sono — últimas 2 semanas</div>
                <div class="clinico-grafico">${grafSono}</div>
                <div style="display:flex;gap:12px;font-size:0.65em;color:#90A4AE;margin-top:4px;">
                    <span>🟢 ≥7h adequado</span><span>🟠 6-7h atenção</span><span>🔴 &lt;6h crítico</span>
                </div>
                <div style="height:1px;background:#EEF2F7;margin:12px 0;"></div>
                <div class="clinico-secao-titulo">🏔️ Foco diário — últimas 2 semanas</div>
                <div class="clinico-grafico">${grafFoco}</div>
                <div style="font-size:0.65em;color:#90A4AE;margin-top:4px;">🟣 ≥60min adequado · 🔵 30-60min moderado</div>
            </div>
        </div>`:''}
        <div class="clinico-wrap">
            <div class="clinico-secao">
                <div class="clinico-secao-titulo">📝 Análise Clínica Detalhada</div>
                <div style="margin-bottom:12px;">
                    <div style="font-size:0.78em;font-weight:700;color:#1565C0;margin-bottom:5px;">😴 Sono e Recuperação Neurológica</div>
                    <div style="font-size:0.83em;color:#37474F;line-height:1.7;">${parecerSono()}</div>
                </div>
                <div style="margin-bottom:12px;">
                    <div style="font-size:0.78em;font-weight:700;color:#2E7D32;margin-bottom:5px;">🎯 Função Executiva e Planejamento</div>
                    <div style="font-size:0.83em;color:#37474F;line-height:1.7;">${parecerMetas()}</div>
                </div>
                <div style="margin-bottom:12px;">
                    <div style="font-size:0.78em;font-weight:700;color:#7C3AED;margin-bottom:5px;">🏔️ Atenção Sustentada e Foco</div>
                    <div style="font-size:0.83em;color:#37474F;line-height:1.7;">${parecerFoco()}</div>
                </div>
                ${avgCelular!==null?`
                <div>
                    <div style="font-size:0.78em;font-weight:700;color:#F57F17;margin-bottom:5px;">📱 Regulação do Uso de Tecnologia</div>
                    <div style="font-size:0.83em;color:#37474F;line-height:1.7;">${parecerTela()}</div>
                </div>`:''}
            </div>
        </div>
        <div class="clinico-wrap">
            <div class="clinico-secao">
                <div class="clinico-secao-titulo">⭐ Avaliação Geral do Período</div>
                <div style="display:flex;align-items:center;gap:14px;padding:6px 0;">
                    <div style="width:56px;height:56px;border-radius:50%;background:${scoreCor};display:flex;align-items:center;justify-content:center;color:white;font-size:1.2em;font-weight:900;flex-shrink:0;">${scoreGeral}</div>
                    <div>
                        <div style="font-size:0.88em;font-weight:700;color:#1A237E;">${scoreLabel}</div>
                        <div style="font-size:0.75em;color:#546E7A;margin-top:3px;">Score baseado em sono, metas, foco e tempo de tela</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="clinico-aviso">⚠️ <strong>Importante:</strong> Relatório gerado automaticamente a partir de dados autodeclarados. Não substitui avaliação clínica profissional.</div>`;
    }

    function gerarHistoricoHTML(dailyData) {
        if (!dailyData || typeof dailyData !== 'object') return '<p style="color:#90A4AE;font-size:0.85em;">Nenhum histórico disponível.</p>';
        const dias = Object.keys(dailyData).sort().reverse();
        if (dias.length === 0) return '<p style="color:#90A4AE;font-size:0.85em;">Nenhum histórico disponível.</p>';

        return dias.slice(0, 30).map(data => {
            const info = dailyData[data];
            const sonoTxt = (info.sono && info.sono[0]) ? info.sono[0].horas + 'h' : '—';
            const focoTxt = (info.pom && info.pom.minFoco > 0) ? info.pom.minFoco + 'min' : '0min';
            const celTxt = info.celular ? (info.celular.horas + 'h ' + info.celular.minutos + 'min') : '—';
            const aguaTxt = info.copos ? (info.copos * 250) + 'ml' : '0ml';
            const remedioTxt = (info.remedio && info.remedio.horaRegistro) ? '✅' : '❌';
            let metasConc = 0, metasTot = 0;
            if(info.metas) { metasTot+=info.metas.length; metasConc+=info.metas.filter(m=>m.done).length; }
            if(info.metasFixas) { metasTot+=info.metasFixas.length; metasConc+=info.metasFixas.filter(m=>m.done).length; }
            const metasPct = metasTot > 0 ? Math.round((metasConc/metasTot)*100) : null;
            const metasCor = metasPct===null?'#90A4AE':metasPct>=70?'#2E7D32':metasPct>=40?'#F57F17':'#C62828';

            return `<div class="hist-item">
                <div class="hist-data">📅 ${data}</div>
                <div class="hist-linha">😴 Sono: <span>${sonoTxt}</span> &nbsp;|&nbsp; 🏔️ Foco: <span>${focoTxt}</span> &nbsp;|&nbsp; 💧 Água: <span>${aguaTxt}</span></div>
                <div class="hist-linha">📱 Tela: <span>${celTxt}</span> &nbsp;|&nbsp; 💊 Remédio: <span>${remedioTxt}</span> &nbsp;|&nbsp; 🎯 Metas: <span style="color:${metasCor};">${metasConc}/${metasTot}${metasPct!==null?' ('+metasPct+'%)':''}</span></div>
            </div>`;
        }).join('');
    }

    function gerarAnalise(dados) {
        let analise = '';
        if (dados.score >= 70) analise += '✅ Excelente desempenho geral. ';
        else if (dados.score >= 40) analise += '⚠️ Desempenho moderado. ';
        else analise += '❌ Score baixo — requer atenção. ';
        if (dados.sonoMedia && dados.sonoMedia < 6) analise += '💤 Privação de sono detectada. ';
        if (dados.metasPct && dados.metasPct >= 80) analise += '🎯 Ótima adesão às metas. ';
        return analise || 'Poucos dados para análise completa.';
    }

    // ===== BUSCAR DADOS =====
    async function buscarRelatorios() {
        const divLista = document.getElementById('lista-relatorios');
        divLista.innerHTML = "<p style='text-align:center;padding:30px;'>🔄 Carregando dados...</p>";
        dadosGlobais = [];
        let totalScore = 0, qtdPacientes = 0;

        try {
            const querySnapshot = await db.collection("usuarios").get();
            divLista.innerHTML = "";

            if (querySnapshot.empty) {
                divLista.innerHTML = "<p style='text-align:center;padding:30px;color:#90A4AE;'>Nenhum paciente encontrado.</p>";
                document.getElementById('total-pacientes').innerText = "0";
                document.getElementById('score-medio').innerText = "0";
                return;
            }

            querySnapshot.forEach((documento) => {
                const dados = documento.data();
                const id = documento.id;
                dadosGlobais.push({ id, ...dados });
                qtdPacientes++;
                totalScore += Number(dados.score) || 0;

                const scoreCor = (dados.score||0)>=70?'#2E7D32':(dados.score||0)>=40?'#F57F17':'#C62828';
                const uid = id.replace(/[^a-z0-9]/g,'_');
                const dtEnvio = dados.ultimoEnvio ? new Date(dados.ultimoEnvio).toLocaleString('pt-BR') : '—';
                const notasSalvas = carregarNotas(uid);
                const telSalvo = carregarTelefone(uid);

                const hoje = new Date();
                const iniDefault = new Date(); iniDefault.setDate(hoje.getDate()-29);

                const cartaoHTML = `
                <details id="details-${uid}">
                    <summary>
                        <span>👤 ${dados.apelido || id}</span>
                        <span class="score-badge" style="background:${scoreCor};">Score: ${dados.score||0}</span>
                    </summary>
                    <div class="conteudo-card">
                        <div class="analise-auto">${gerarAnalise(dados)}</div>
                        <div class="dados-grid">
                            <div class="dado-item"><strong>Último envio</strong><span style="font-size:0.85em;color:#546E7A;">${dtEnvio}</span></div>
                            <div class="dado-item"><strong>Score semanal</strong><span style="color:${scoreCor};">${dados.score||0}</span></div>
                            <div class="dado-item"><strong>Dias registrados</strong><span>${dados.diasDados||0}</span></div>
                            <div class="dado-item"><strong>Sono médio</strong><span>${dados.sonoMedia ? dados.sonoMedia+'h' : '—'}</span></div>
                            <div class="dado-item"><strong>Metas</strong><span>${dados.metasPct!=null ? dados.metasPct+'%' : '—'}</span></div>
                            <div class="dado-item"><strong>Foco total</strong><span>${dados.focoTotal ? dados.focoTotal+'min' : '—'}</span></div>
                        </div>

                        <!-- CONTATO / WHATSAPP -->
                        <div class="contato-section">
                            <div class="contato-title">📱 Contato do Paciente</div>
                            <div class="contato-row">
                                <input type="tel" id="tel-${uid}" placeholder="DDD + número (ex: 64999991234)"
                                    value="${telSalvo}"
                                    oninput="document.getElementById('tel-info-${uid}').textContent=''">
                                <button onclick="salvarTelefone('${uid}')" style="background:#1565C0;color:white;padding:8px 14px;border-radius:8px;font-size:0.82em;">💾 Salvar</button>
                                <button class="btn-whatsapp" onclick="abrirWhatsApp('${uid}','${dados.apelido||id}')">💬 Chat</button>
                                <button class="btn-whatsapp" onclick="enviarRelatorioWhatsApp('${uid}','${dados.apelido||id}',${dados.score||0},'${dados.sonoMedia||''}',${dados.metasPct!=null?dados.metasPct:null})">📤 Enviar Relatório</button>
                            </div>
                            <div class="contato-salvo" id="tel-info-${uid}"></div>
                        </div>

                        <div class="tab-nav">
                            <button class="tab-btn active" onclick="switchTab('${uid}','relatorio')">📊 Relatório Clínico</button>
                            <button class="tab-btn" onclick="switchTab('${uid}','historico')">📅 Histórico Diário</button>
                            <button class="tab-btn" onclick="switchTab('${uid}','notas')">📝 Anotações Clínicas</button>
                        </div>

                        <div class="periodo-filtro" id="filtro-${uid}">
                            <label>Período:</label>
                            <input type="date" id="ini-${uid}" value="${hojeISO(iniDefault)}">
                            <span style="font-size:0.8em;color:#546E7A;">até</span>
                            <input type="date" id="fim-${uid}" value="${hojeISO(hoje)}">
                            <button onclick="atualizarRelatorio('${uid}')">🔄 Gerar</button>
                            <button onclick="setP('${uid}',7)" style="background:#EEF2FF;color:#1565C0;padding:6px 10px;font-size:0.78em;">7d</button>
                            <button onclick="setP('${uid}',15)" style="background:#EEF2FF;color:#1565C0;padding:6px 10px;font-size:0.78em;">15d</button>
                            <button onclick="setP('${uid}',30)" style="background:#EEF2FF;color:#1565C0;padding:6px 10px;font-size:0.78em;">30d</button>
                        </div>

                        <div class="tab-content active" id="tab-relatorio-${uid}">
                            ${gerarRelatorioClinico(dados.dailyData, hojeISO(iniDefault), hojeISO(hoje))}
                        </div>
                        <div class="tab-content" id="tab-historico-${uid}">
                            <div style="max-height:400px;overflow-y:auto;padding:4px;">
                                ${gerarHistoricoHTML(dados.dailyData)}
                            </div>
                        </div>
                        <div class="tab-content" id="tab-notas-${uid}">
                            <div style="padding:4px 0 8px;">
                                <label style="font-size:0.8em;font-weight:700;color:#1565C0;display:block;margin-bottom:8px;">📝 Anotações Clínicas — ${dados.apelido||id}</label>
                                <textarea class="notas-area" id="notas-${uid}" placeholder="Registre observações, evolução, pontos de atenção, estratégias combinadas...">${notasSalvas}</textarea>
                                <div style="display:flex;align-items:center;margin-top:8px;gap:10px;">
                                    <button class="btn-salvar-notas" onclick="salvarNotas('${uid}')">💾 Salvar Anotações</button>
                                    <span class="notas-salvas-info" id="notas-info-${uid}"></span>
                                </div>
                                <p style="font-size:0.72em;color:#90A4AE;margin-top:8px;">💡 As anotações ficam salvas localmente neste dispositivo.</p>
                            </div>
                        </div>

                        <div style="border-top:1px solid #EEF2F7;margin-top:16px;padding-top:12px;">
                            <button class="btn-remover" onclick="deletarPaciente('${id}')">🗑️ Remover Paciente</button>
                        </div>
                    </div>
                </details>`;

                divLista.innerHTML += cartaoHTML;
            });

            document.getElementById('total-pacientes').innerText = qtdPacientes;
            document.getElementById('score-medio').innerText = (totalScore / qtdPacientes).toFixed(1);

        } catch (erro) {
            console.error("Erro:", erro);
            divLista.innerHTML = `<p style="color:red;text-align:center;padding:20px;">Erro ao conectar com o Firebase: ${erro.message}</p>`;
        }
    }

    function switchTab(uid, tab) {
        const tabs = ['relatorio', 'historico', 'notas'];
        tabs.forEach(t => {
            const el = document.getElementById('tab-'+t+'-'+uid);
            if(el) el.classList.toggle('active', t===tab);
        });
        document.querySelectorAll(`#details-${uid} .tab-btn`).forEach((btn, i) => {
            btn.classList.toggle('active', tabs[i]===tab);
        });
        const filtro = document.getElementById('filtro-'+uid);
        if(filtro) filtro.style.display = tab==='relatorio' ? 'flex' : 'none';
    }

    function setP(uid, days) {
        const fim = new Date();
        const ini = new Date(); ini.setDate(fim.getDate()-(days-1));
        document.getElementById('ini-'+uid).value = hojeISO(ini);
        document.getElementById('fim-'+uid).value = hojeISO(fim);
        atualizarRelatorio(uid);
    }

    function atualizarRelatorio(uid) {
        const ini = document.getElementById('ini-'+uid).value;
        const fim = document.getElementById('fim-'+uid).value;
        const paciente = dadosGlobais.find(p => p.id.replace(/[^a-z0-9]/g,'_') === uid);
        if (!paciente) return;
        const container = document.getElementById('tab-relatorio-'+uid);
        if (container) container.innerHTML = gerarRelatorioClinico(paciente.dailyData, ini, fim);
    }

    window.deletarPaciente = async function(id) {
        if (!confirm("Tem certeza que deseja APAGAR os dados deste paciente? Essa ação não pode ser desfeita.")) return;
        try {
            await db.collection("usuarios").doc(id).delete();
            alert("Paciente removido com sucesso!");
            buscarRelatorios();
        } catch (error) {
            alert("Erro ao remover: " + error.message);
        }
    }

    window.imprimirRelatorioAdmin = function() {
        if (!dadosGlobais || dadosGlobais.length === 0) {
            alert("Não há dados para gerar o PDF.");
            return;
        }
        const hoje = new Date();
        const iniDefault = new Date(); iniDefault.setDate(hoje.getDate()-29);
        const strIni = hojeISO(iniDefault);
        const strFim = hojeISO(hoje);

        let htmlPrint = "<!DOCTYPE html><html lang='pt-BR'><head><meta charset='UTF-8'><title>Relatório Clínico Completo - CleanTdah</title><style>";
        htmlPrint += `
            body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 20px; color: #333; }
            h1 { text-align: center; color: #2c3e50; margin-bottom: 30px; font-size: 24px; }
            .paciente-container { page-break-after: always; margin-bottom: 40px; }
            .paciente-header { font-size: 20px; font-weight: bold; color: #1A237E; margin-bottom: 15px; border-bottom: 2px solid #1A237E; padding-bottom: 5px; }
            .clinico-wrap { background: white; border-radius: 12px; overflow: hidden; border: 1px solid #ddd; margin-bottom: 12px; }
            .clinico-secao { padding: 14px 18px; border-bottom: 1px solid #EEF2F7; }
            .clinico-secao:last-child { border-bottom: none; }
            .clinico-secao-titulo { font-size: 13px; font-weight: 800; color: #1565C0; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; }
            .clinico-linha { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid #F5F7FA; font-size: 13px; }
            .clinico-linha .cl-lbl { color: #546E7A; flex: 1; }
            .clinico-linha .cl-val { font-weight: 700; color: #1A237E; margin-left: 8px; }
            .clinico-linha .cl-badge { font-size: 11px; padding: 3px 8px; border-radius: 10px; font-weight: 700; margin-left: 6px; }
            .clinico-grafico { display: flex; gap: 4px; align-items: flex-end; height: 60px; margin: 10px 0; }
            .clinico-grafico-bar { flex: 1; border-radius: 4px 4px 0 0; min-height: 4px; border: 1px solid rgba(0,0,0,0.1); }
            .clinico-aviso { background: #FFF8E1; border: 1px solid #FFE082; padding: 10px 14px; font-size: 12px; color: #5D4037; margin-top: 10px; border-radius: 8px; }
            .clinico-topo { background: #1565C0; color: white; padding: 16px 20px; }
            .clinico-topo .ct-titulo { font-size: 16px; font-weight: 800; margin-bottom: 2px; }
            .clinico-topo .ct-sub { font-size: 12px; opacity: 0.9; margin-bottom: 10px; }
            .ct-meta { display: flex; gap: 10px; }
            .ct-meta-item { background: rgba(255,255,255,0.2); border-radius: 10px; padding: 8px 12px; flex: 1; text-align: center; }
            .ct-meta-item .ctm-val { font-size: 18px; font-weight: 800; }
            .ct-meta-item .ctm-lbl { font-size: 10px; opacity: 0.9; margin-top: 2px; }
            .cl-norm { background: #E8F5E9; color: #2E7D32; }
            .cl-atenc { background: #FFF8E1; color: #F57F17; }
            .cl-crit  { background: #FFEBEE; color: #C62828; }
            @media print { body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } .paciente-container { page-break-after: always; } }
        `;
        htmlPrint += "</style></head><body><h1>Relatório Clínico Consolidado — CleanTdah</h1>";
        dadosGlobais.forEach(p => {
            htmlPrint += "<div class='paciente-container'>";
            htmlPrint += "<div class='paciente-header'>👤 Paciente: " + (p.apelido || p.id) + "</div>";
            htmlPrint += gerarRelatorioClinico(p.dailyData, strIni, strFim);
            htmlPrint += "</div>";
        });
        htmlPrint += "</body></html>";
        const janelaPrint = window.open('', '', 'width=900,height=700');
        janelaPrint.document.write(htmlPrint);
        janelaPrint.document.close();
        setTimeout(() => { janelaPrint.focus(); janelaPrint.print(); }, 500);
    };

    document.getElementById('btn-csv').addEventListener('click', () => {
        if (!dadosGlobais.length) { alert("Não há dados para exportar."); return; }
        let csv = "ID,Apelido,Periodo,Score,FocoTotal,MediaSono,MetasPct,DiasRegistrados\n";
        dadosGlobais.forEach(p => {
            csv += `${p.id},${p.apelido||''},${p.periodo||''},${p.score||0},${p.focoTotal||0},${p.sonoMedia||''},${p.metasPct||''},${p.diasDados||0}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "relatorio_pacientes_cleantdah.csv";
        a.click();
    });

    document.getElementById('btn-atualizar').addEventListener('click', buscarRelatorios);
    buscarRelatorios();
</script>
