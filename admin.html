<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel da Psicóloga - CleanTdah</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 20px; background-color: #f0f2f5; color: #333; }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 20px; }
        
        /* Layout responsivo para Desktop */
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* Painel Resumo */
        .painel-resumo { display: flex; justify-content: space-around; background: #2980b9; color: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); flex-wrap: wrap; gap: 10px;}
        .resumo-item { text-align: center; flex: 1; min-width: 150px;}
        .resumo-valor { font-size: 2em; font-weight: bold; }
        
        /* Botões e Ações */
        .acoes-topo { display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;}
        button { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { opacity: 0.8; }
        .btn-csv { background-color: #f39c12; color: white; }
        .btn-importar { background-color: #8e44ad; color: white; }
        .btn-remover { background-color: #e74c3c; color: white; padding: 5px 10px; font-size: 0.9em; margin-top: 10px; }
        
        /* Cards dos Pacientes */
        details { background: white; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); padding: 15px; border-left: 5px solid #3498db; }
        summary { font-size: 1.2em; font-weight: bold; color: #2c3e50; cursor: pointer; list-style: none; outline: none; display: flex; justify-content: space-between; align-items: center; }
        summary::-webkit-details-marker { display: none; }
        .conteudo-card { margin-top: 15px; padding-top: 15px; border-top: 1px solid #eee; }
        .dados-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin-bottom: 16px; }
        .dado-item { background: #f8f9fa; padding: 10px; border-radius: 5px; font-size: 0.9em; }
        .dado-item strong { display: block; color: #555; font-size: 0.8em; margin-bottom: 2px; }
        .dado-item span { font-size: 1.1em; font-weight: 700; color: #1565C0; }
        .analise-auto { background: #e8f8f5; padding: 12px; border-radius: 5px; border-left: 4px solid #1abc9c; font-style: italic; margin-bottom: 14px; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="container">
    <h1>👩‍⚕️ Painel da Psicóloga - TDAH Care</h1>

    <div class="painel-resumo">
        <div class="resumo-item">
            <div class="resumo-valor" id="total-pacientes">0</div>
            <div>Pacientes Ativos</div>
        </div>
    </div>

    <div class="acoes-topo">
        <input type="file" id="input-importar" style="display: none;" accept=".json">
        <button class="btn-importar" onclick="document.getElementById('input-importar').click()">📥 Importar Paciente</button>
        <button class="btn-csv" id="btn-csv">📊 Exportar CSV Geral</button>
    </div>

    <div id="lista-pacientes"></div>
</div>

<script>
    let dadosGlobais = [];
    try {
        dadosGlobais = JSON.parse(localStorage.getItem('adminPacientes')) || [];
    } catch(e) {
        dadosGlobais = [];
    }

    function renderizarPacientes() {
        const lista = document.getElementById('lista-pacientes');
        lista.innerHTML = '';
        document.getElementById('total-pacientes').innerText = dadosGlobais.length;

        dadosGlobais.forEach((paciente, index) => {
            const detail = document.createElement('details');
            detail.innerHTML = `
                <summary>
                    ${paciente.apelido} (Atualizado em: ${paciente.dataExportacao})
                    <span style="font-size: 0.8em; color: #7f8c8d;">Ver Detalhes ▼</span>
                </summary>
                <div class="conteudo-card">
                    <div class="analise-auto">
                        <strong>Relatório:</strong> Score de bem-estar: ${paciente.score}. Metas cumpridas: ${paciente.metasPct}%.
                    </div>
                    <div class="dados-grid">
                        <div class="dado-item"><strong>Score Geral</strong><span>${paciente.score}</span></div>
                        <div class="dado-item"><strong>Foco Total</strong><span>${paciente.focoTotal}h</span></div>
                        <div class="dado-item"><strong>Média de Sono</strong><span>${paciente.sonoMedia}</span></div>
                        <div class="dado-item"><strong>Metas</strong><span>${paciente.metasPct}%</span></div>
                    </div>
                    <button class="btn-remover" onclick="removerPaciente(${index})">🗑 Remover</button>
                </div>
            `;
            lista.appendChild(detail);
        });
    }

    document.getElementById('input-importar').addEventListener('change', function(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const pacienteImportado = JSON.parse(e.target.result);
                if(!pacienteImportado.apelido) throw new Error("Arquivo inválido.");

                const indexExistente = dadosGlobais.findIndex(p => p.apelido === pacienteImportado.apelido);
                if(indexExistente >= 0) {
                    dadosGlobais[indexExistente] = pacienteImportado; 
                } else {
                    dadosGlobais.push(pacienteImportado); 
                }

                localStorage.setItem('adminPacientes', JSON.stringify(dadosGlobais));
                renderizarPacientes();
                alert("✅ Dados de " + pacienteImportado.apelido + " integrados com sucesso!");
            } catch (error) {
                alert("❌ Erro ao ler o arquivo: Certifique-se de que é um arquivo JSON válido do TDAH Care.");
            }
        };
        reader.readAsText(file);
        event.target.value = ''; 
    });

    function removerPaciente(index) {
        if(confirm("Deseja remover este paciente?")) {
            dadosGlobais.splice(index, 1);
            localStorage.setItem('adminPacientes', JSON.stringify(dadosGlobais));
            renderizarPacientes();
        }
    }

    document.getElementById('btn-csv').addEventListener('click', () => {
        if (dadosGlobais.length === 0) {
            alert("Não há dados para exportar.");
            return;
        }
        let csvContent = "Apelido,Data,Score,FocoTotal,MediaSono,MetasPct\n";
        dadosGlobais.forEach(p => {
            csvContent += `${p.apelido},${p.dataExportacao},${p.score},${p.focoTotal},${p.sonoMedia},${p.metasPct}\n`;
        });
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "Relatorio_Geral_TdahCare.csv";
        link.click();
    });

    renderizarPacientes();
</script>
</body>
</html>
